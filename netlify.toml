[build]
  command = "pnpm run build"
  publish = "dist"

[[redirects]]
  from = "https://cms-lyfline.netlify.app/*"
  to = "https://cms.lyfline.id/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "22"
  NETLIFY_USE_PNPM = "true"
